<!DOCTYPE html> 
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員註冊 - 得正 dejeng</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #87CEEB 0%, #4682B4 100%); 
            height: 100vh; display: flex; align-items: center; justify-content: center; 
            font-family: 'Noto Sans TC', sans-serif; position: relative; overflow: hidden;
        }

        /* 懸浮背景特效 */
        .background-pattern { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.1; background-image: radial-gradient(circle at 20% 80%, #ffffff 0%, transparent 50%), radial-gradient(circle at 80% 20%, #ffffff 0%, transparent 50%); z-index: 0; }
        .floating-element { position: absolute; border-radius: 50%; background: rgba(255, 255, 255, 0.15); animation: float 6s ease-in-out infinite; z-index: 0; }
        .floating-element:nth-child(1) { width: 120px; height: 120px; top: 15%; left: 15%; animation-delay: 0s; }
        .floating-element:nth-child(2) { width: 80px; height: 80px; top: 65%; right: 10%; animation-delay: 2s; }
        .floating-element:nth-child(3) { width: 60px; height: 60px; bottom: 20%; left: 25%; animation-delay: 4s; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-20px); } }

        /* 卡片設計 (毛玻璃質感) */
        .card { 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            border: none; border-radius: 25px; width: 100%; max-width: 420px; 
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2); padding: 2rem; z-index: 1;
            transform: translateY(20px); opacity: 0; animation: slideUp 0.8s forwards ease-out;
        }
        @keyframes slideUp { to { transform: translateY(0); opacity: 1; } }

        /* Logo 區域 */
        .brand-header { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 10px; }
        .brand-logo { width: 50px; height: 50px; border-radius: 50%; border: 3px solid #E0F6FF; box-shadow: 0 4px 10px rgba(0,0,0,0.1); object-fit: cover; }
        .brand-title { color: #2F4F4F; font-weight: 800; letter-spacing: 1px; margin: 0; font-size: 1.8rem; }
        
        /* 表單設計 */
        .input-group-text { background: #f4f6f8; border-right: none; color: #4682B4; border-radius: 10px 0 0 10px; }
        .form-control { border-left: none; padding: 12px; background: #f4f6f8; border-radius: 0 10px 10px 0; font-size: 0.95rem; }
        .form-control:focus { border-color: #4682B4; box-shadow: none; background: #ffffff; }
        .input-group { border-radius: 10px; border: 1px solid #dee2e6; transition: 0.3s; overflow: hidden; margin-bottom: 1rem; }
        .input-group:focus-within { border-color: #4682B4; box-shadow: 0 0 0 0.25rem rgba(70, 130, 180, 0.2); background: #ffffff; }
        .input-group:focus-within .input-group-text { background: #ffffff; }

        /* 按鈕設計 */
        .btn-gradient { background: linear-gradient(135deg, #5DADE2 0%, #4682B4 100%); border: none; color: white; padding: 14px; font-size: 1.1rem; font-weight: 700; border-radius: 50px; transition: 0.3s; width: 100%; margin-top: 10px; box-shadow: 0 10px 20px rgba(93, 173, 226, 0.3); }
        .btn-gradient:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(93, 173, 226, 0.4); color: white; }
        
        /* 驗證碼 */
        .captcha-box { background: linear-gradient(to right, #f4f6f8, #e9ecef); color: #2F4F4F; font-family: monospace; font-size: 1.5rem; letter-spacing: 5px; display: flex; align-items: center; justify-content: center; border-radius: 10px; cursor: pointer; user-select: none; border: 1px dashed #ccc; font-weight: bold; text-shadow: 1px 1px 0px rgba(255,255,255,0.8); }
        
        .bottom-links a { color: #4682B4; font-weight: 600; text-decoration: none; transition: 0.3s; }
        .bottom-links a:hover { color: #2F4F4F; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="background-pattern"></div>
    <div class="floating-element"></div>
    <div class="floating-element"></div>
    <div class="floating-element"></div>

    <div class="card">
        <div class="text-center mb-4">
            <div class="brand-header">
                <img src="image/logo.jpeg" alt="得正 dejeng Logo" class="brand-logo">
                <h2 class="brand-title">得正 dejeng</h2>
            </div>
            <p class="text-muted small mt-2">註冊會員，享受最新優惠與專屬茶飲</p>
        </div>
        
        <div class="input-group">
            <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
            <input type="text" id="username" class="form-control" placeholder="使用者名稱 (顯示名稱)">
        </div>
        <div class="input-group">
            <span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
            <input type="email" id="email" class="form-control" placeholder="電子信箱">
        </div>
        <div class="input-group">
            <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
            <input type="password" id="password" class="form-control" placeholder="密碼 (至少6位)">
        </div>
        <div class="input-group">
            <span class="input-group-text"><i class="fa-solid fa-check-double"></i></span>
            <input type="password" id="confirm-password" class="form-control" placeholder="確認密碼">
        </div>

        <div class="mb-4 mt-2">
            <div class="row g-2">
                <div class="col-7">
                    <input type="text" id="captcha-input" class="form-control text-center h-100" placeholder="輸入驗證碼" style="border-radius: 10px; border: 1px solid #dee2e6;">
                </div>
                <div class="col-5">
                    <div id="captcha-display" class="captcha-box h-100 py-2" title="點擊重新產生">1234</div>
                </div>
            </div>
        </div>
        
        <button id="btn-signup" class="btn btn-gradient mb-3">立即註冊</button>
        
        <div class="text-center mt-3 small bottom-links">
            <span class="text-muted">已有帳號？</span> 
            <a href="login.html">前往登入</a>
            <br>
            <a href="index.html" class="mt-4 d-inline-block text-muted" style="font-weight: normal;"><i class="fa-solid fa-arrow-left"></i> 返回首頁</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyC-LcCfcPYCYAQZ7n45YCe6tCY_jb-ygvI", authDomain: "sonicboom-shop.firebaseapp.com", projectId: "sonicboom-shop", storageBucket: "sonicboom-shop.firebasestorage.app", messagingSenderId: "976804831944", appId: "1:976804831944:web:6ede6a95196478bd49bbfd", measurementId: "G-3FEKWL0QXZ" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        let currentCaptcha = "";
        function generateCaptcha() {
            const chars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            let result = "";
            for(let i=0; i<4; i++) result += chars.charAt(Math.floor(Math.random() * chars.length));
            currentCaptcha = result;
            document.getElementById('captcha-display').innerText = result;
        }

        generateCaptcha();
        document.getElementById('captcha-display').addEventListener('click', generateCaptcha);

        document.getElementById('btn-signup').addEventListener('click', () => {
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPwd = document.getElementById('confirm-password').value;
            const captchaInput = document.getElementById('captcha-input').value.toUpperCase();

            if(!username || !email || !password) { alert("請填寫所有欄位！"); return; }
            if(password.length < 6) { alert("密碼長度需至少 6 位數！"); return; }
            if(password !== confirmPwd) { alert("兩次密碼輸入不一致！"); return; }
            if(captchaInput !== currentCaptcha) { 
                alert("驗證碼錯誤，請重新輸入！"); 
                generateCaptcha(); 
                document.getElementById('captcha-input').value = "";
                return; 
            }

            const btn = document.getElementById('btn-signup');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 處理中...';
            btn.disabled = true;

            createUserWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    const user = userCredential.user;
                    updateProfile(user, { displayName: username }).then(() => {
                        alert("註冊成功！歡迎加入 " + username);
                        window.location.href = "login.html";
                    });
                })
                .catch((error) => {
                    alert("註冊失敗：" + error.message);
                    generateCaptcha();
                    btn.innerHTML = '立即註冊';
                    btn.disabled = false;
                });
        });
    </script>
</body>
</html>
