<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的購物車 - 得正 dejeng</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(90deg, #48C9B0 0%, #1ABC9C 100%);
            --glass-bg: rgba(255, 255, 255, 0.9);
        }

        body {
            background: #f4f6f8;
            color: #333;
            font-family: 'Noto Sans TC', sans-serif;
            min-height: 100vh;
        }

        .navbar {
            background: #B0E0E6 !important;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .brand-logo {
            font-weight: bold;
            color: #2F4F4F;
            text-decoration: none;
            display: flex;
            align-items: center;
        }

        .brand-logo img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-right: 10px;
        }

        .cart-item {
            background: white;
            border: 1px solid #ddd;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        .cart-img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 10px;
            margin-right: 15px;
        }

        .qty-input {
            background: #f8f9fa;
            border: 1px solid #ccc;
            width: 60px;
            text-align: center;
            border-radius: 5px;
            padding: 5px;
        }

        .summary-card {
            background: white;
            border: 1px solid #ddd;
            border-radius: 15px;
            padding: 30px;
            position: sticky;
            top: 100px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            color: #555;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
            font-size: 1.5rem;
            font-weight: bold;
            color: #1a73e8;
        }

        .btn-checkout {
            background: var(--primary-gradient);
            border: none;
            color: white;
            font-weight: bold;
            padding: 15px;
            border-radius: 50px;
            width: 100%;
            margin-top: 20px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(26, 188, 156, 0.4);
        }

        .btn-checkout:hover {
            transform: scale(1.02);
            color: white;
            background: linear-gradient(90deg, #1ABC9C 0%, #16A085 100%);
        }

        .trash-btn {
            color: #ff4d4d;
            background: transparent;
            border: none;
            font-size: 1.2rem;
            margin-left: 15px;
            transition: 0.3s;
        }

        .trash-btn:hover {
            color: #ff0000;
            transform: scale(1.2);
        }

        .empty-cart {
            display: none;
            text-align: center;
            padding: 80px 20px;
        }

        .toast-custom {
            background: white;
            color: #333;
            border-left: 4px solid #1ABC9C;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light sticky-top py-3">
        <div class="container">
            <a class="navbar-brand brand-logo fs-4" href="index.html">
                <img src="image/logo.jpeg" alt="Logo"> 得正 dejeng
            </a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto ms-4">
                    <li class="nav-item"><a class="nav-link text-dark fw-bold" href="index.html"><i
                                class="fa-solid fa-arrow-left"></i> 繼續點餐</a></li>
                </ul>
                <div class="d-flex align-items-center gap-3">
                    <span id="user-display" class="badge bg-info text-dark px-3 py-2" style="display:none;"></span>
                    <a id="btn-login" class="btn btn-outline-dark rounded-pill px-4" href="login.html">登入</a>
                    <button id="btn-logout" class="btn btn-outline-danger rounded-pill px-4"
                        style="display:none;">登出</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <h2 class="mb-4 fw-bold text-dark"><i class="fa-solid fa-cart-shopping text-info me-2"></i>我的購物車</h2>

        <div class="row" id="cart-content">
            <div class="col-lg-8" id="cart-items-container"></div>
            <div class="col-lg-4">
                <div class="summary-card">
                    <h4 class="mb-4 fw-bold border-bottom pb-3 text-dark">訂單摘要</h4>
                    <div class="summary-row"><span>總杯數</span><span id="total-cups">0 杯</span></div>
                    <div class="summary-row"><span>小計</span><span>$<span id="subtotal">0</span></span></div>
                    <div class="summary-row"><span>外送費</span><span class="text-success fw-bold">免運費</span></div>
                    <div class="total-row"><span>總金額</span><span>$<span id="final-total">0</span></span></div>
                    <button class="btn-checkout" onclick="checkout()">前往結帳 <i
                            class="fa-solid fa-arrow-right ms-2"></i></button>
                </div>
            </div>
        </div>

        <div class="empty-cart" id="empty-state">
            <i class="fa-solid fa-mug-hot fa-5x text-secondary mb-4 opacity-50"></i>
            <h3 class="text-dark fw-bold">您的購物車是空的</h3>
            <p class="text-muted mb-4">看起來您還沒有加入任何茶飲。</p>
            <a href="index.html" class="btn btn-outline-info rounded-pill px-5">去選購茶飲</a>
        </div>
    </div>

    <div class="toast-container position-fixed top-0 end-0 p-3">
        <div id="liveToast" class="toast toast-custom align-items-center">
            <div class="d-flex">
                <div class="toast-body fs-6"></div><button type="button" class="btn-close me-2 m-auto"
                    data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyC-LcCfcPYCYAQZ7n45YCe6tCY_jb-ygvI", authDomain: "sonicboom-shop.firebaseapp.com", projectId: "sonicboom-shop", storageBucket: "sonicboom-shop.firebasestorage.app", messagingSenderId: "976804831944", appId: "1:976804831944:web:6ede6a95196478bd49bbfd", measurementId: "G-3FEKWL0QXZ" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            const userDisplay = document.getElementById('user-display');
            const btnLogin = document.getElementById('btn-login');
            const btnLogout = document.getElementById('btn-logout');
            if (user) {
                userDisplay.style.display = 'inline-block';
                userDisplay.innerHTML = `<i class="fa-solid fa-user me-2"></i> ${user.displayName || user.email.split('@')[0]}`;
                btnLogin.style.display = 'none';
                btnLogout.style.display = 'inline-block';
            } else {
                userDisplay.style.display = 'none';
                btnLogin.style.display = 'inline-block';
                btnLogout.style.display = 'none';
            }
        });

        document.getElementById('btn-logout').addEventListener('click', () => {
            if (confirm("確定要登出嗎？")) {
                localStorage.removeItem('dejeng_cart');
                signOut(auth).then(() => { window.location.href = "index.html"; });
            }
        });
    </script>

    <script>
        const products = {
            "tea01": { name: "水之森玄米抹茶", price: 65, img: "image/01.jpg" },
            "tea02": { name: "英倫伯爵紅茶", price: 55, img: "image/02.jpg" },
            "tea03": { name: "珍珠鮮奶", price: 75, img: "image/03.jpg" },
            "tea04": { name: "手炒黑糖鮮奶", price: 80, img: "image/04.jpg" },
            "tea05": { name: "嫩仙草凍奶", price: 70, img: "image/05.jpg" },
            "tea06": { name: "海鹽芒果綠", price: 65, img: "image/06.jpg" },
            "tea12": { name: "季節限定特調", price: 85, img: "image/12.jpg" },
            "tea13": { name: "招牌綜合果茶", price: 90, img: "image/13.jpg" }
        };

        let cart = JSON.parse(localStorage.getItem('dejeng_cart')) || [];

        function renderCart() {
            const container = document.getElementById('cart-items-container');
            const emptyState = document.getElementById('empty-state');
            const cartContent = document.getElementById('cart-content');

            if (cart.length > 0) {
                emptyState.style.display = 'none';
                cartContent.style.display = 'flex';
                let html = '';
                let total = 0;
                let totalCups = 0;

                cart.forEach((item, index) => {
                    const p = products[item.id];
                    if (!p) return;
                    const itemTotal = p.price * item.qty;
                    total += itemTotal;
                    totalCups += parseInt(item.qty);

                    html += `
                    <div class="cart-item">
                        <img src="${p.img}" alt="${p.name}" class="cart-img">
                        <div class="flex-grow-1">
                            <h5 class="mb-1 fw-bold">${p.name}</h5>
                            <p class="text-muted small mb-0"><span class="badge bg-secondary me-1">${item.sugar}</span> <span class="badge bg-secondary">${item.ice}</span></p>
                        </div>
                        <div class="text-end me-4">
                            <div class="mb-2 fw-bold text-primary">$<span class="price">${p.price}</span></div>
                            <input type="number" class="qty-input" value="${item.qty}" min="1" onchange="updateQty(${index}, this.value)">
                        </div>
                        <button class="trash-btn" onclick="removeItem(${index})"><i class="fa-solid fa-trash-can"></i></button>
                    </div>`;
                });

                container.innerHTML = html;
                document.getElementById('subtotal').innerText = total.toLocaleString();
                document.getElementById('final-total').innerText = total.toLocaleString();
                document.getElementById('total-cups').innerText = `${totalCups} 杯`;
            } else {
                cartContent.style.display = 'none';
                emptyState.style.display = 'block';
            }
        }

        window.updateQty = function (index, newQty) {
            if (newQty < 1) newQty = 1;
            cart[index].qty = parseInt(newQty);
            localStorage.setItem('dejeng_cart', JSON.stringify(cart));
            renderCart();
        }

        window.removeItem = function (index) {
            if (confirm('確定要移除此茶飲嗎？')) {
                cart.splice(index, 1);
                localStorage.setItem('dejeng_cart', JSON.stringify(cart));
                renderCart();
            }
        }

        window.showToast = function (message) {
            const toastEl = document.getElementById('liveToast');
            const toastBody = toastEl.querySelector('.toast-body');
            toastBody.innerHTML = `<i class="fa-solid fa-circle-check text-success me-2"></i> ${message}`;
            const toast = new bootstrap.Toast(toastEl); toast.show();
        }

        window.checkout = function () {
            const btn = document.querySelector('.btn-checkout');
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin me-2"></i> 處理中...';
            btn.disabled = true;
            setTimeout(() => {
                window.showToast("感謝購買，茶飲製作中！");
                btn.innerHTML = '<i class="fa-solid fa-check me-2"></i> 訂單完成';
                localStorage.removeItem('dejeng_cart');
                cart = [];
                setTimeout(() => { renderCart(); btn.innerHTML = '前往結帳 <i class="fa-solid fa-arrow-right ms-2"></i>'; btn.disabled = false; }, 2000);
            }, 1500);
        }

        renderCart();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
