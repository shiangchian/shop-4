<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員登入 - 得正 dejeng</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #48C9B0 0%, #1ABC9C 100%);
        }

        body {
            background: linear-gradient(135deg, #E0F6FF 0%, #B0E0E6 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Noto Sans TC', sans-serif;
        }

        .card {
            background: white;
            border: none;
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            padding: 2rem;
        }

        .brand-title {
            color: #2F4F4F;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .input-group-text {
            background: #f8f9fa;
            border-right: none;
            color: #1ABC9C;
        }

        .form-control {
            border-left: none;
            padding: 12px;
        }

        .form-control:focus {
            border-color: #1ABC9C;
            box-shadow: none;
        }

        .input-group:focus-within {
            box-shadow: 0 0 0 0.25rem rgba(26, 188, 156, 0.25);
            border-radius: 5px;
        }

        .btn-gradient {
            background: var(--primary-gradient);
            border: none;
            color: white;
            padding: 12px;
            font-weight: bold;
            border-radius: 50px;
            transition: 0.3s;
            width: 100%;
            margin-top: 10px;
        }

        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(26, 188, 156, 0.3);
            color: white;
        }

        .captcha-box {
            background: #f4f6f8;
            color: #2F4F4F;
            font-family: monospace;
            font-size: 1.5rem;
            letter-spacing: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
            cursor: pointer;
            user-select: none;
            border: 1px solid #dee2e6;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="text-center mb-4">
            <h2 class="brand-title"><i class="fa-solid fa-mug-hot text-success"></i> 得正 dejeng</h2>
            <p class="text-muted small mt-2">歡迎回來，請登入您的會員帳號</p>
        </div>

        <div class="mb-3">
            <div class="input-group">
                <span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
                <input type="email" id="email" class="form-control" placeholder="電子信箱">
            </div>
        </div>
        <div class="mb-3">
            <div class="input-group">
                <span class="input-group-text"><i class="fa-solid fa-key"></i></span>
                <input type="password" id="password" class="form-control" placeholder="密碼">
            </div>
        </div>

        <div class="mb-4">
            <div class="row g-2">
                <div class="col-7">
                    <input type="text" id="captcha-input" class="form-control text-center h-100" placeholder="輸入驗證碼">
                </div>
                <div class="col-5">
                    <div id="captcha-display" class="captcha-box h-100 py-2" title="點擊重新產生">1234</div>
                </div>
            </div>
        </div>

        <button id="btn-login" class="btn btn-gradient mb-3">立即登入</button>

        <div class="text-center mt-3 small">
            <span class="text-muted">還沒帳號？</span>
            <a href="signup.html" class="text-success fw-bold text-decoration-none">註冊會員</a>
            <br>
            <a href="index.html" class="text-muted mt-3 d-inline-block text-decoration-none"><i
                    class="fa-solid fa-arrow-left"></i> 回首頁</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC-LcCfcPYCYAQZ7n45YCe6tCY_jb-ygvI",
            authDomain: "sonicboom-shop.firebaseapp.com",
            projectId: "sonicboom-shop",
            storageBucket: "sonicboom-shop.firebasestorage.app",
            messagingSenderId: "976804831944",
            appId: "1:976804831944:web:6ede6a95196478bd49bbfd",
            measurementId: "G-3FEKWL0QXZ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        let currentCaptcha = "";
        function generateCaptcha() {
            const chars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            let result = "";
            for (let i = 0; i < 4; i++) result += chars.charAt(Math.floor(Math.random() * chars.length));
            currentCaptcha = result;
            document.getElementById('captcha-display').innerText = result;
        }

        generateCaptcha();
        document.getElementById('captcha-display').addEventListener('click', generateCaptcha);

        document.getElementById('btn-login').addEventListener('click', () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const captchaInput = document.getElementById('captcha-input').value.toUpperCase();

            if (!email || !password) { alert("請填寫信箱與密碼！"); return; }
            if (captchaInput !== currentCaptcha) {
                alert("驗證碼錯誤，請重新輸入！");
                generateCaptcha();
                document.getElementById('captcha-input').value = "";
                return;
            }

            const btn = document.getElementById('btn-login');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 登入中...';
            btn.disabled = true;

            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    window.location.href = "index.html"; // 登入成功跳回首頁
                })
                .catch((error) => {
                    console.error(error);
                    alert("登入失敗：帳號或密碼錯誤");
                    generateCaptcha();
                    btn.innerHTML = '立即登入';
                    btn.disabled = false;
                });
        });
    </script>
</body>

</html>
